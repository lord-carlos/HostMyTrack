server {
    listen       80;
    server_name  _;

    # Default root - serves the project UI
    root /usr/share/nginx/html;
    index index.html;

    # Serve the project site at '/'
    # When hosted under a subpath (e.g., /music/) the site should still serve index.html
    # so that requests for '/music/' will return the UI. The static files use relative
    # references in index.html so assets will load from the correct subpath.
    location / {
        try_files $uri $uri/ /index.html;
        autoindex on;
        autoindex_exact_size off;
    }

    # Optional: A single shared mount available at '/hls'
    # Map this to a volume (see docker-compose example below)
    # This is where your music folders with /hls and an output.json are expected
    # Serve HLS output at /hls (root)
    location /hls/ {
        alias /srv/media/hls/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_format json;
        charset utf-8;
    }

    # Also support subpath hosting where the container receives requests for something
    # like `/music/hls/output.json` without the proxy stripping the path. This regex
    # captures any single top-level prefix and forwards the /hls/ segment to the local
    # hls folder. Example: /music/hls/output.json -> /srv/media/hls/output.json
    location ~ ^/(.+)/hls/(.*)$ {
        alias /srv/media/hls/$2;
        autoindex on;
        autoindex_exact_size off;
        autoindex_format json;
        charset utf-8;
    }


    # Optionally allow CORS (if serving content to other origins)
    add_header Access-Control-Allow-Origin *;
}
